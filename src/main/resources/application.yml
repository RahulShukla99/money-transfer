server:
  port: 8080

spring:
  application:
    name: money-transfer-service
  datasource:
    url: jdbc:postgresql://localhost:5432/transfer_app
    username: postgres
    password: 1
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  jackson:
    default-property-inclusion: non_null
  sql:
    init:
      mode: always

logging:
  level:
    org.hibernate.SQL: info
