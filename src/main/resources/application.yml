server:
  port: 8080

spring:
  application:
    name: money-transfer-service
  datasource:
    url: jdbc:postgresql://localhost:5432/transfer_app
    username: postgres
    password: 1
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  jackson:
    default-property-inclusion: non_null
  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false
      timeout: 2s
  sql:
    init:
      mode: always

money-transfer:
  lock:
    type: local
    redis:
      ttl: 30s
      wait-timeout: 2s
      retry-delay: 50ms

logging:
  level:
    org.hibernate.SQL: info
